services:
  postgres:
    image: postgres:16-alpine
    container_name: ogai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ogai
      POSTGRES_PASSWORD: ogai_dev_pw
      POSTGRES_DB: ogai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogai -d ogai"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: open-generative-ai:latest
    container_name: open-gen-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ogai:ogai_dev_pw@postgres:5432/ogai
      - MUAPI_API_KEY=${MUAPI_API_KEY:-}
      - SEGMIND_API_KEY=${SEGMIND_API_KEY:-}
      - BYTEPLUS_API_KEY=${BYTEPLUS_API_KEY:-}
      - BYTEPLUS_REGION=${BYTEPLUS_REGION:-ap-southeast-1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build: .
    image: open-generative-ai:latest
    container_name: ogai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ogai:ogai_dev_pw@postgres:5432/ogai
      - MUAPI_API_KEY=${MUAPI_API_KEY:-}
      - SEGMIND_API_KEY=${SEGMIND_API_KEY:-}
      - BYTEPLUS_API_KEY=${BYTEPLUS_API_KEY:-}
      - BYTEPLUS_REGION=${BYTEPLUS_REGION:-ap-southeast-1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - uploads_data:/data/uploads
    command: ["node", "worker/index.js"]

volumes:
  postgres_data:
  uploads_data:
